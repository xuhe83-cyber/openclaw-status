<!DOCTYPE html>
<html lang="zh-CN">
<head>
 <meta charset="UTF-8">
 <meta name="viewport" content="width=device-width, initial-scale=1.0">
 <title>OpenClaw 状态表盘</title>
 <style>
 * { margin: 0; padding: 0; box-sizing: border-box; }
 body {
 font-family: -apple-system, "SF Pro Display", sans-serif;
 background: #0a0a0f;
 color: #e0e0e0;
 padding: 20px;
 line-height: 1.6;
 }
 h1 { text-align: center; font-size: 2em; margin-bottom: 30px; color: #00ffc8; }
 .section { background: #151520; border: 1px solid #2a2a3a; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
 h2 { font-size: 1.1em; margin-bottom: 15px; color: #aaa; }
 .agent-card {
 display: flex;
 align-items: center;
 padding: 12px 0;
 border-bottom: 1px solid #1e1e2e;
 gap: 15px;
 }
 .agent-card:last-child { border-bottom: none; }
 .agent-status-indicator {
 width: 10px;
 height: 10px;
 border-radius: 50%;
 background-color: #666;
 }
 .agent-status-indicator.running { background-color: #00ffc8; }
 .agent-status-indicator.idle { background-color: #666; }

 .progress-bar-container {
 flex-grow: 1;
 height: 8px;
 background-color: #2a2a3a;
 border-radius: 4px;
 overflow: hidden;
 }
 .progress-bar {
 height: 100%;
 background-color: #00ffc8;
 width: 0%;
 border-radius: 4px;
 transition: width 0.3s ease-in-out;
 }
 .progress-text { margin-left: 10px; font-size: 0.9em; color: #888; }
 .metric-grid {
 display: grid;
 grid-template-columns: repeat(auto-fit, minmax(150px, 1fr));
 gap: 15px;
 }
 .metric-card {
 background: #1e1e2e;
 border-radius: 8px;
 padding: 15px;
 text-align: center;
 border: 1px solid #333;
 }
 .metric-card h3 { font-size: 1em; color: #00ffc8; margin-bottom: 5px; }
 .metric-card p { font-size: 1.8em; font-weight: bold; color: #e0e0e0; }
 .resource-bar-container {
 display: flex;
 align-items: center;
 margin-bottom: 10px;
 }
 .resource-bar-container span { width: 60px; font-size: 0.9em; margin-right: 10px; color: #888; }
 .resource-bar-fill {
 height: 8px;
 background-color: #00ffc8;
 border-radius: 4px;
 width: 0%;
 transition: width 0.3s ease-in-out;
 }
 .resource-bar-fill.warning { background-color: #ffc107; }
 .resource-bar-fill.danger { background-color: #dc3545; }
 #error-box {
 background-color: #dc3545;
 color: white;
 padding: 10px;
 border-radius: 8px;
 margin-bottom: 20px;
 display: none;
 }
 .timestamp {
 font-size: 0.8em;
 color: #666;
 text-align: center;
 margin-top: 20px;
 }
 .refresh-button {
 display: block;
 width: fit-content;
 margin: 20px auto;
 padding: 10px 20px;
 background-color: #00ffc8;
 color: #0a0a0f;
 border: none;
 border-radius: 8px;
 cursor: pointer;
 font-weight: bold;
 transition: background-color 0.2s;
 }
 .refresh-button:hover {
 background-color: #00e0b0;
 }
 </style>
</head>
<body>
 <h1>🤖 OpenClaw 状态表盘</h1>

 <div id="error-box"></div>

 <div class="section">
 <h2>🤖 Agent 状态</h2>
 <div id="agent-status"></div>
 </div>

 <div class="section">
 <h2>📁 知识库统计</h2>
 <div class="metric-grid">
 <div class="metric-card">
 <h3>待处理 (TODO)</h3>
 <p id="vault-todo">?</p>
 </div>
 <div class="metric-card">
 <h3>收件箱 (Inbox)</h3>
 <p id="vault-inbox">?</p>
 </div>
 <div class="metric-card">
 <h3>已入库 (Vault)</h3>
 <p id="vault-vault">?</p>
 </div>
 <div class="metric-card">
 <h3>MOCs/标签</h3>
 <p id="vault-tagsMOCs">?</p>
 </div>
 <div class="metric-card">
 <h3>双向链接 (Bridged)</h3>
 <p id="vault-bridged">?</p>
 </div>
 </div>
 </div>

 <div class="section">
 <h2>💻 系统资源</h2>
 <div id="resources"></div>
 </div>

 <div class="timestamp">
 数据更新时间: <span id="last-update">未知</span>
 <br>
 服务器时间: <span id="server-time">未知</span>
 </div>

 <button class="refresh-button" onclick="loadData(true)">手动刷新</button>

 <script>
 function setElementText(id, text) {
 const el = document.getElementById(id);
 if (el) el.textContent = text;
 }

 function showError(message) {
 const errorBox = document.getElementById('error-box');
 if (errorBox) {
 errorBox.textContent = `错误: ${message}`;
 errorBox.style.display = 'block';
 }
 }

 async function loadData(manualRefresh = false) {
 document.getElementById('error-box').style.display = 'none';
 setElementText('last-update', '加载中...');
 setElementText('server-time', '加载中...');
 ['vault-todo', 'vault-inbox', 'vault-vault', 'vault-tagsMOCs', 'vault-bridged'].forEach(id => setElementText(id, '?'));
 document.getElementById('agent-status').innerHTML = '';
 document.getElementById('resources').innerHTML = '';

 try {
 const response = await fetch('./status-data.json?' + new Date().getTime());
 if (!response.ok) throw new Error(`HTTP 错误! 状态: ${response.status}`);
 const data = await response.json();

 // Agent Status
 const agentStatusDiv = document.getElementById('agent-status');
 const defaultAgents = [
 { name: 'Main (Mini)', status: 'running', progress: 100 },
 { name: 'Gatekeeper', status: 'idle', progress: 0 },
 { name: 'Librarian', status: 'idle', progress: 0 },
 { name: 'Bridgebuilder', status: 'idle', progress: 0 },
 { name: 'Cleaner', status: 'running', progress: 54, done: 167, total: 309 }
 ];
 defaultAgents.forEach(agent => {
 const agentCard = document.createElement('div');
 agentCard.className = 'agent-card';
 const statusClass = agent.status === 'running' ? 'running' : 'idle';
 const statusText = agent.status === 'running' ? '运行中' : '空闲';
 const progressText = agent.done && agent.total ? ` (${agent.done}/${agent.total})` : '';
 agentCard.innerHTML = `
 <div class="agent-status-indicator ${statusClass}"></div>
 <span>${agent.name}</span>
 <div class="progress-bar-container">
 <div class="progress-bar" style="width: ${agent.progress}%;"></div>
 </div>
 <span class="progress-text">${statusText} ${agent.progress}%${progressText}</span>
 `;
 agentStatusDiv.appendChild(agentCard);
 });

 // Vault Stats
 const vault = data.vault || {};
 setElementText('vault-todo', vault.todo ?? '?');
 setElementText('vault-inbox', vault.inbox ?? '?');
 setElementText('vault-vault', vault.vault ?? '?');
 setElementText('vault-tagsMOCs', vault.tagsMOCs ?? '?');
 setElementText('vault-bridged', vault.bridged ?? '?');

 // Resources
 const resourcesDiv = document.getElementById('resources');
 const resources = data.resources || {};
 for (const key in resources) {
 const value = typeof resources[key] === 'number' ? resources[key] : 0;
 const resourceBar = document.createElement('div');
 resourceBar.className = 'resource-bar-container';
 resourceBar.innerHTML = `
 <span>${key}:</span>
 <div class="progress-bar-container">
 <div class="resource-bar-fill" style="width: ${value}%;"></div>
 </div>
 <span class="progress-text">${value}%</span>
 `;
 resourcesDiv.appendChild(resourceBar);
 }

 // Timestamps
 setElementText('server-time', data.timestamp ? new Date(data.timestamp).toLocaleString() : '未知');
 setElementText('last-update', new Date().toLocaleString());

 if (manualRefresh) alert('数据已刷新！');
 } catch (error) {
 console.error("加载数据失败:", error);
 showError(`无法加载状态数据: ${error.message}`);
 setElementText('last-update', '加载失败');
 setElementText('server-time', '加载失败');
 }
 }

 loadData();
 setInterval(loadData, 60000);
 </script>
</body>
</html>
