<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OpenClaw 状态表盘</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #1a1a2e; color: #eee; padding: 20px; }
        h1 { text-align: center; margin-bottom: 20px; color: #00d4ff; }
        .container { max-width: 1200px; margin: 0 auto; }
        .section { background: #16213e; border-radius: 12px; padding: 20px; margin-bottom: 20px; }
        .section h2 { color: #00d4ff; margin-bottom: 15px; font-size: 1.2em; }
        .agents-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .agent-card { background: #0f3460; border-radius: 10px; padding: 15px; text-align: center; }
        .agent-icon { font-size: 2em; margin-bottom: 10px; }
        .agent-name { font-weight: bold; margin-bottom: 5px; }
        .agent-status { font-size: 0.9em; margin-bottom: 10px; }
        .status-running { color: #00ff88; }
        .status-idle { color: #888; }
        .progress-bar { background: #1a1a2e; border-radius: 5px; height: 8px; overflow: hidden; }
        .progress-fill { background: linear-gradient(90deg, #00d4ff, #00ff88); height: 100%; transition: width 0.3s; }
        .stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 10px; }
        .stat-item { background: #0f3460; border-radius: 8px; padding: 15px; text-align: center; }
        .stat-value { font-size: 2em; font-weight: bold; color: #00d4ff; }
        .stat-label { font-size: 0.9em; color: #888; }
        .timestamp { text-align: center; color: #666; font-size: 0.9em; margin-top: 20px; }
        .refresh-btn { background: #00d4ff; color: #1a1a2e; border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; margin-bottom: 20px; }
        .refresh-btn:hover { background: #00ff88; }
    </style>
</head>
<body>
    <div class="container">
        <h1>🤖 OpenClaw 状态表盘</h1>
        <button class="refresh-btn" onclick="loadData()">🔄 刷新</button>
        
        <div class="section">
            <h2>📊 Agent 状态</h2>
            <div class="agents-grid" id="agents-container">加载中...</div>
        </div>
        
        <div class="section">
            <h2>📁 知识库统计</h2>
            <div class="stats-grid" id="vault-container">加载中...</div>
        </div>
        
        <div class="section">
            <h2>💻 系统资源</h2>
            <div class="stats-grid" id="resources-container">加载中...</div>
        </div>
        
        <div class="timestamp" id="timestamp">--</div>
    </div>

    <script>
        async function loadData() {
            try {
                const response = await fetch('status-data.json?t=' + Date.now());
                const data = await response.json();
                renderAgents(data.agents);
                renderVault(data.vault);
                renderResources(data.resources);
                document.getElementById('timestamp').textContent = '更新时间: ' + data.timestamp;
            } catch (error) {
                console.error('加载失败:', error);
                document.getElementById('agents-container').innerHTML = '<p style="color:red">加载失败: ' + error.message + '</p>';
            }
        }

        function renderAgents(agents) {
            const container = document.getElementById('agents-container');
            if (!agents || agents.length === 0) {
                container.innerHTML = '<p>无数据</p>';
                return;
            }
            
            let html = '';
            agents.forEach(agent => {
                const statusClass = agent.status === 'running' ? 'status-running' : 'status-idle';
                const progress = agent.progress || 0;
                html += `
                    <div class="agent-card">
                        <div class="agent-icon">${agent.icon}</div>
                        <div class="agent-name">${agent.name}</div>
                        <div class="agent-status ${statusClass}">${agent.status === 'running' ? '● 运行中' : '○ 空闲'}</div>
                        <div style="font-size: 0.85em; color: #888; margin-bottom: 5px;">${agent.task}</div>
                        <div class="progress-bar">
                            <div class="progress-fill" style="width: ${progress}%"></div>
                        </div>
                        <div style="font-size: 0.8em; color: #666; margin-top: 5px;">${progress}%</div>
                        ${agent.done !== undefined ? `<div style="font-size: 0.8em; color: #00d4ff;">${agent.done}/${agent.total}</div>` : ''}
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderVault(vault) {
            const container = document.getElementById('vault-container');
            if (!vault) {
                container.innerHTML = '<p>无数据</p>';
                return;
            }
            
            const items = [
                { label: 'Inbox', value: vault.inbox },
                { label: 'Vault', value: vault.vault },
                { label: 'Pending', value: vault.pending },
                { label: 'TagsMOCs', value: vault.tagsMOCs },
                { label: 'Bridged', value: vault.bridged }
            ];
            
            let html = '';
            items.forEach(item => {
                html += `
                    <div class="stat-item">
                        <div class="stat-value">${item.value}</div>
                        <div class="stat-label">${item.label}</div>
                    </div>
                `;
            });
            container.innerHTML = html;
        }

        function renderResources(resources) {
            const container = document.getElementById('resources-container');
            if (!resources) {
                container.innerHTML = '<p>无数据</p>';
                return;
            }
            
            container.innerHTML = `
                <div class="stat-item">
                    <div class="stat-value">${resources.memory}%</div>
                    <div class="stat-label">内存使用</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value">${resources.disk}%</div>
                    <div class="stat-label">磁盘使用</div>
                </div>
            `;
        }

        // 页面加载时获取数据
        loadData();
        // 每5分钟自动刷新
        setInterval(loadData, 300000);
    </script>
</body>
</html>
