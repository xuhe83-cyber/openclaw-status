<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>📊 OpenClaw Agent 监控表盘</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
            color: #333;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header h1 {
            font-size: 24px;
            color: #667eea;
        }

        .last-update {
            font-size: 14px;
            color: #666;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .refresh-btn:hover {
            background: #5568d3;
            transform: translateY(-2px);
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            margin-bottom: 20px;
        }

        .card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 16px;
            padding: 24px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
        }

        .card h2 {
            font-size: 18px;
            margin-bottom: 16px;
            color: #667eea;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .metric-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid #eee;
        }

        .metric-row:last-child {
            border-bottom: none;
        }

        .metric-label {
            font-weight: 500;
            color: #555;
        }

        .metric-value {
            font-weight: 600;
            font-size: 18px;
        }

        .progress-bar {
            width: 100%;
            height: 24px;
            background: #e0e0e0;
            border-radius: 12px;
            overflow: hidden;
            margin: 8px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 12px;
            transition: width 0.5s ease;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 8px;
            color: white;
            font-size: 12px;
            font-weight: 600;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 12px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-success {
            background: #d4edda;
            color: #155724;
        }

        .status-warning {
            background: #fff3cd;
            color: #856404;
        }

        .status-danger {
            background: #f8d7da;
            color: #721c24;
        }

        .agent-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 12px;
        }

        .agent-item {
            background: #f8f9fa;
            padding: 16px;
            border-radius: 12px;
            text-align: center;
            transition: transform 0.3s;
        }

        .agent-item:hover {
            transform: translateY(-4px);
        }

        .agent-status {
            font-size: 32px;
            margin-bottom: 8px;
        }

        .agent-name {
            font-weight: 600;
            font-size: 14px;
            color: #333;
        }

        .agent-role {
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }

        .alert-list {
            list-style: none;
        }

        .alert-item {
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .alert-warning {
            background: #fff3cd;
            border-left: 4px solid #ffc107;
        }

        .alert-danger {
            background: #f8d7da;
            border-left: 4px solid #dc3545;
        }

        .alert-success {
            background: #d4edda;
            border-left: 4px solid #28a745;
        }

        .full-width {
            grid-column: 1 / -1;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .loading {
            animation: pulse 1.5s infinite;
        }

        .auto-refresh {
            font-size: 12px;
            color: #999;
            margin-top: 8px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>📊 OpenClaw Agent 监控表盘</h1>
            <div style="display: flex; align-items: center; gap: 16px;">
                <span class="last-update" id="lastUpdate">最后更新：--</span>
                <button class="refresh-btn" onclick="refreshData()">🔄 刷新</button>
            </div>
        </div>

        <div class="grid">
            <!-- Cleaner 进度 -->
            <div class="card">
                <h2>🧹 Cleaner 萃取进度</h2>
                <div class="progress-bar">
                    <div class="progress-fill" id="cleanerProgress" style="width: 0%">0%</div>
                </div>
                <div class="metric-row">
                    <span class="metric-label">已完成</span>
                    <span class="metric-value" id="cleanerDone">0</span>
                </div>
                <div class="metric-row">
                    <span class="metric-label">待处理</span>
                    <span class="metric-value" id="cleanerPending">0</span>
                </div>
            </div>

            <!-- 系统资源 -->
            <div class="card">
                <h2>💻 系统资源</h2>
                <div class="metric-row">
                    <span class="metric-label">内存使用</span>
                    <div>
                        <span class="metric-value" id="memoryPercent">0%</span>
                        <span class="status-badge status-success" id="memoryStatus">✅</span>
                    </div>
                </div>
                <div class="metric-row">
                    <span class="metric-label">磁盘使用</span>
                    <div>
                        <span class="metric-value" id="diskPercent">0%</span>
                        <span class="status-badge" id="diskStatus">--</span>
                    </div>
                </div>
            </div>

            <!-- 知识库流转 -->
            <div class="card full-width">
                <h2>📚 知识库流转</h2>
                <div class="grid" style="grid-template-columns: repeat(5, 1fr); gap: 16px;">
                    <div class="agent-item">
                        <div class="agent-status" id="inboxStatus">📥</div>
                        <div class="agent-name" id="inboxCount">0</div>
                        <div class="agent-role">Inbox</div>
                    </div>
                    <div class="agent-item">
                        <div class="agent-status" id="vaultStatus">🏭</div>
                        <div class="agent-name" id="vaultCount">0</div>
                        <div class="agent-role">Vault</div>
                    </div>
                    <div class="agent-item">
                        <div class="agent-status" id="pendingStatus">⏳</div>
                        <div class="agent-name" id="pendingCount">0</div>
                        <div class="agent-role">Pending</div>
                    </div>
                    <div class="agent-item">
                        <div class="agent-status" id="tagsMOCsStatus">📊</div>
                        <div class="agent-name" id="tagsMOCsCount">0</div>
                        <div class="agent-role">TagsMOCs</div>
                    </div>
                    <div class="agent-item">
                        <div class="agent-status" id="bridgedStatus">🕸️</div>
                        <div class="agent-name" id="bridgedCount">0</div>
                        <div class="agent-role">Bridged</div>
                    </div>
                </div>
            </div>

            <!-- Agent 状态 -->
            <div class="card full-width">
                <h2>🤖 Agent 状态</h2>
                <div class="agent-grid" id="agentGrid">
                    <!-- 动态生成 -->
                </div>
            </div>

            <!-- 待办提醒 -->
            <div class="card full-width">
                <h2>⚠️ 待办提醒</h2>
                <ul class="alert-list" id="alertList">
                    <li class="alert-item alert-success">✅ 无待办事项，系统运行正常</li>
                </ul>
            </div>
        </div>

        <div class="auto-refresh">
            🔄 自动刷新：每 30 秒 | 数据源：STATUS.md
        </div>
    </div>

    <script>
        const agents = [
            { id: 'main', name: 'Main', role: '枢纽员 (Mini)' },
            { id: 'gatekeeper', name: 'Gatekeeper', role: '守门人' },
            { id: 'librarian', name: 'Librarian', role: '馆长' },
            { id: 'bridgebuilder', name: 'Bridgebuilder', role: '织网者' },
            { id: 'cleaner', name: 'Cleaner', role: '清洁工' }
        ];

        async function refreshData() {
            try {
                const response = await fetch('status-data.json?t=' + Date.now());
                const data = await response.json();
                updateDashboard(data);
            } catch (error) {
                console.error('Failed to fetch data:', error);
            }
        }

        function updateDashboard(data) {
            // 更新时间
            document.getElementById('lastUpdate').textContent = '最后更新：' + new Date().toLocaleTimeString('zh-CN');

            // Cleaner 进度
            const cleanerPercent = Math.round((data.cleaner.done / data.cleaner.total) * 100);
            document.getElementById('cleanerProgress').style.width = cleanerPercent + '%';
            document.getElementById('cleanerProgress').textContent = cleanerPercent + '%';
            document.getElementById('cleanerDone').textContent = data.cleaner.done;
            document.getElementById('cleanerPending').textContent = data.cleaner.pending;

            // 系统资源
            document.getElementById('memoryPercent').textContent = data.resources.memory + '%';
            document.getElementById('memoryStatus').className = 'status-badge ' + (data.resources.memory > 80 ? 'status-warning' : 'status-success');
            document.getElementById('memoryStatus').textContent = data.resources.memory > 80 ? '⚠️' : '✅';

            document.getElementById('diskPercent').textContent = data.resources.disk + '%';
            document.getElementById('diskStatus').className = 'status-badge ' + (data.resources.disk > 90 ? 'status-danger' : 'status-success');
            document.getElementById('diskStatus').textContent = data.resources.disk > 90 ? '🚨' : '✅';

            // 知识库流转
            updateVault('inbox', data.vault.inbox);
            updateVault('vault', data.vault.vault);
            updateVault('pending', data.vault.pending);
            updateVault('tagsMOCs', data.vault.tagsMOCs);
            updateVault('bridged', data.vault.bridged);

            // Agent 状态
            const agentGrid = document.getElementById('agentGrid');
            agentGrid.innerHTML = '';
            agents.forEach(agent => {
                const status = data.agents[agent.id] || '⚪';
                const item = document.createElement('div');
                item.className = 'agent-item';
                item.innerHTML = `
                    <div class="agent-status">${status}</div>
                    <div class="agent-name">${agent.name}</div>
                    <div class="agent-role">${agent.role}</div>
                `;
                agentGrid.appendChild(item);
            });

            // 待办提醒
            const alertList = document.getElementById('alertList');
            if (data.alerts.length === 0) {
                alertList.innerHTML = '<li class="alert-item alert-success">✅ 无待办事项，系统运行正常</li>';
            } else {
                alertList.innerHTML = data.alerts.map(alert => {
                    const type = alert.includes('🚨') ? 'danger' : 'warning';
                    return `<li class="alert-item alert-${type}">${alert}</li>`;
                }).join('');
            }
        }

        function updateVault(prefix, count) {
            document.getElementById(prefix + 'Count').textContent = count;
            const statusEl = document.getElementById(prefix + 'Status');
            if (count === 0) {
                statusEl.textContent = '✅';
            } else if (count < 10) {
                statusEl.textContent = '🟡';
            } else {
                statusEl.textContent = '⚠️';
            }
        }

        // 初始加载
        refreshData();

        // 自动刷新（30 秒）
        setInterval(refreshData, 30000);
    </script>
</body>
</html>
