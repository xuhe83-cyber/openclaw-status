<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mini-Team Data Panel</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(180deg, #070B12 0%, #0a0f18 100%);
            min-height: 600px;
            color: #9FB0C7;
            padding: 16px;
        }

        .container {
            max-width: 1920px;
            margin: 0 auto;
        }

        /* Header */
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #0a0e15;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 16px;
            border: 1px solid #1a2332;
        }

        .header-left {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, #00F5C4 0%, #00b894 100%);
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            color: #070B12;
            font-weight: bold;
        }

        .header-title {
            font-size: 24px;
            font-weight: 600;
            color: #fff;
        }

        .header-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .health-chip {
            display: flex;
            align-items: center;
            gap: 8px;
            background: #0D1622;
            padding: 6px 12px;
            border-radius: 20px;
            font-size: 13px;
        }

        .led-indicator {
            width: 8px;
            height: 8px;
            border-radius: 50%;
        }

        .led-healthy {
            background: #00D27A;
            box-shadow: 0 0 8px #00D27A;
        }

        .sync-time {
            font-size: 13px;
            color: #9FB0C7;
        }

        .header-btn {
            background: #121A2A;
            border: 1px solid #1a2332;
            color: #9FB0C7;
            padding: 6px 14px;
            border-radius: 6px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .header-btn:hover {
            background: #1a2744;
            color: #fff;
        }

        /* KPI Row */
        .kpi-row {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .kpi-card {
            background: #0D1622;
            border: 1px solid #1a2332;
            border-radius: 8px;
            padding: 16px;
            position: relative;
            overflow: hidden;
        }

        .kpi-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 2px;
            background: linear-gradient(90deg, transparent, #00F5C4, transparent);
            opacity: 0.5;
        }

        .kpi-label {
            font-size: 12px;
            color: #9FB0C7;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .kpi-value {
            font-size: 36px;
            font-weight: 700;
            color: #00F5C4;
            text-shadow: 0 0 20px rgba(0, 245, 196, 0.3);
            margin-bottom: 8px;
        }

        .kpi-source {
            font-size: 11px;
            color: #5a6a7a;
            margin-bottom: 8px;
        }

        .kpi-sample-btn {
            font-size: 11px;
            background: #121A2A;
            border: 1px solid #1a2332;
            color: #9FB0C7;
            padding: 4px 10px;
            border-radius: 4px;
            cursor: pointer;
        }

        /* Agents Section */
        .agents-section {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
            margin-bottom: 16px;
        }

        .agent-card {
            background: #0D1622;
            border: 1px solid #1a2332;
            border-radius: 8px;
            padding: 14px;
        }

        .agent-header {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 10px;
        }

        .status-led {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        .led-busy {
            background: #FF5D73;
            box-shadow: 0 0 10px #FF5D73;
        }

        .led-recent {
            background: #FFB020;
            box-shadow: 0 0 10px #FFB020;
        }

        .led-idle {
            background: #00D27A;
            box-shadow: 0 0 10px #00D27A;
        }

        .agent-name {
            font-size: 14px;
            font-weight: 600;
            color: #fff;
        }

        .agent-status {
            font-size: 12px;
            padding: 2px 8px;
            border-radius: 4px;
            margin-left: auto;
        }

        .status-busy {
            background: rgba(255, 93, 115, 0.15);
            color: #FF5D73;
        }

        .status-recent {
            background: rgba(255, 176, 32, 0.15);
            color: #FFB020;
        }

        .status-idle {
            background: rgba(0, 210, 122, 0.15);
            color: #00D27A;
        }

        .agent-meta {
            font-size: 11px;
            color: #5a6a7a;
            line-height: 1.6;
        }

        .agent-progress {
            margin-top: 8px;
            background: #121A2A;
            border-radius: 4px;
            height: 6px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, #00F5C4, #00b894);
            border-radius: 4px;
            transition: width 0.3s;
        }

        /* Bottom Section */
        .bottom-section {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 12px;
            margin-bottom: 16px;
        }

        .alerts-card, .logs-card {
            background: #0D1622;
            border: 1px solid #1a2332;
            border-radius: 8px;
            padding: 14px;
        }

        .card-title {
            font-size: 13px;
            font-weight: 600;
            color: #fff;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .alert-item {
            font-size: 12px;
            color: #FFB020;
            margin-bottom: 6px;
        }

        .alert-item a {
            color: #00F5C4;
            text-decoration: none;
        }

        .log-item {
            font-family: 'SF Mono', 'Monaco', monospace;
            font-size: 11px;
            color: #5a6a7a;
            margin-bottom: 4px;
        }

        .log-time {
            color: #9FB0C7;
        }

        /* System Bar */
        .system-bar {
            background: #0a0e15;
            border: 1px solid #1a2332;
            border-radius: 8px;
            padding: 12px 20px;
            display: flex;
            align-items: center;
            gap: 24px;
        }

        .system-title {
            font-size: 12px;
            color: #9FB0C7;
        }

        .system-metric {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 12px;
        }

        .metric-label {
            color: #5a6a7a;
        }

        .metric-value {
            color: #9FB0C7;
        }

        .mini-sparkline {
            width: 40px;
            height: 16px;
            background: linear-gradient(90deg, #121A2A, #1a2744);
            border-radius: 2px;
        }

        .loading {
            text-align: center;
            padding: 20px;
            color: #5a6a7a;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-left">
                <div class="logo-icon">M</div>
                <span class="header-title">Mini-Team Data Panel</span>
            </div>
            <div class="header-right">
                <div class="health-chip">
                    <div class="led-indicator led-healthy" id="healthLed"></div>
                    <span id="healthStatus">Healthy</span>
                </div>
                <span class="sync-time" id="syncTime">Loading...</span>
                <button class="header-btn" onclick="refreshData()">Refresh</button>
                <button class="header-btn" onclick="showHistory()">History</button>
            </div>
        </header>

        <!-- KPI Row -->
        <div class="kpi-row" id="kpiRow">
            <div class="loading">Loading data...</div>
        </div>

        <!-- Agents Section -->
        <div class="agents-section" id="agentsSection">
            <div class="loading">Loading agents...</div>
        </div>

        <!-- Bottom Section -->
        <div class="bottom-section">
            <div class="alerts-card">
                <div class="card-title">⚠️ Alerts</div>
                <div id="alertsContent">
                    <div class="alert-item">[Warning] Vault count is 0 — possible ingestion failure. <a href="#">[Details]</a></div>
                </div>
            </div>
            <div class="logs-card">
                <div class="card-title">📋 Recent Logs</div>
                <div id="logsContent">
                    <div class="log-item"><span class="log-time">--:--:--</span> Waiting for data...</div>
                </div>
            </div>
        </div>

        <!-- System Bar -->
        <div class="system-bar">
            <span class="system-title">System Resources</span>
            <div class="system-metric">
                <span class="metric-label">CPU</span>
                <span class="metric-value" id="cpuValue">--%</span>
                <div class="mini-sparkline"></div>
            </div>
            <div class="system-metric">
                <span class="metric-label">Memory</span>
                <span class="metric-value" id="memValue">--/16GB</span>
                <div class="mini-sparkline"></div>
            </div>
            <div class="system-metric">
                <span class="metric-label">Disk</span>
                <span class="metric-value" id="diskValue">---GB free</span>
                <div class="mini-sparkline"></div>
            </div>
            <div class="system-metric">
                <span class="metric-label">Network</span>
                <span class="metric-value">↕</span>
                <div class="mini-sparkline"></div>
            </div>
        </div>
    </div>

    <script>
        // 状态映射
        const STATUS_MAP = {
            'busy': { led: 'led-busy', class: 'status-busy', text: 'Busy' },
            'recent': { led: 'led-recent', class: 'status-recent', text: 'Recent' },
            'idle': { led: 'led-idle', class: 'status-idle', text: 'Idle' }
        };

        // 加载状态数据
        async function loadData() {
            try {
                const response = await fetch('status-data.json?t=' + Date.now());
                const data = await response.json();
                renderDashboard(data);
            } catch (error) {
                console.error('Failed to load data:', error);
                document.getElementById('kpiRow').innerHTML = '<div class="loading">Failed to load data. Retrying...</div>';
                setTimeout(loadData, 5000);
            }
        }

        // 渲染仪表盘
        function renderDashboard(data) {
            // 同步时间
            document.getElementById('syncTime').textContent = 'Last sync: ' + (data.syncTime || data.lastUpdate || 'N/A');

            // 健康状态
            const health = data.health || 'Healthy';
            document.getElementById('healthStatus').textContent = health;

            // KPI 数据
            const kpi = data.kpi || {};
            document.getElementById('kpiRow').innerHTML = `
                <div class="kpi-card">
                    <div class="kpi-label">Pending</div>
                    <div class="kpi-value">${kpi.pending || 0}</div>
                    <div class="kpi-source">source: Mini/Desktop</div>
                    <button class="kpi-sample-btn">Sample</button>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Inbox</div>
                    <div class="kpi-value">${kpi.inbox || 0}</div>
                    <div class="kpi-source">source: Inbox</div>
                    <button class="kpi-sample-btn">Sample</button>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Vault</div>
                    <div class="kpi-value">${kpi.vault || 0}</div>
                    <div class="kpi-source">—</div>
                    <button class="kpi-sample-btn">Sample</button>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">MOCs/Tags</div>
                    <div class="kpi-value">${kpi.tagsMOCs || 0}</div>
                    <div class="kpi-source">—</div>
                    <button class="kpi-sample-btn">Sample</button>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Bridged</div>
                    <div class="kpi-value">${kpi.bridged || 0}</div>
                    <div class="kpi-source">—</div>
                    <button class="kpi-sample-btn">Sample</button>
                </div>
            `;

            // Agent 数据
            const agents = data.agents || {};
            document.getElementById('agentsSection').innerHTML = renderAgentCard('main', agents.main, 'Main (Mini)') +
                renderAgentCard('gatekeeper', agents.gatekeeper, 'GateKeeper') +
                renderAgentCard('librarian', agents.librarian, 'Librarian') +
                renderAgentCard('bridgebuilder', agents.bridgebuilder, 'BridgeBuilder') +
                renderAgentCard('cleaner', agents.cleaner, 'cLearner', true);

            // 系统资源
            const res = data.resources || {};
            document.getElementById('cpuValue').textContent = res.cpu || '--%';
            document.getElementById('memValue').textContent = res.memory ? `${res.memory.used}/${res.memory.total}GB` : '--/16GB';
            document.getElementById('diskValue').textContent = res.disk || '---GB free';

            // Alerts
            const alerts = data.alerts || [];
            if (alerts.length > 0) {
                document.getElementById('alertsContent').innerHTML = alerts.map(a => 
                    `<div class="alert-item">[${a.level}] ${a.message} <a href="#">[Details]</a></div>`
                ).join('');
            }

            // Logs (模拟)
            document.getElementById('logsContent').innerHTML = `
                <div class="log-item"><span class="log-time">${data.syncTime ? data.syncTime.split(' ')[1] : '--:--:--'}</span> collect: status updated</div>
                <div class="log-item"><span class="log-time">19:31:58</span> cleaner: processed 4 docs</div>
                <div class="log-item"><span class="log-time">19:31:22</span> gatekeeper: evaluated 10 items</div>
                <div class="log-item"><span class="log-time">19:30:45</span> librarian: tagged 3 notes</div>
            `;
        }

        // 渲染 Agent 卡片
        function renderAgentCard(id, agent, displayName, showProgress = false) {
            if (!agent) return '';
            
            const status = STATUS_MAP[agent.status] || STATUS_MAP.idle;
            let meta = `throughput: ${agent.throughput || '0 items/h'}<br>queue: ${agent.queue || 0}<br>last active: ${agent.lastActive || 'unknown'}`;
            
            let progressHtml = '';
            if (showProgress && agent.progress) {
                meta = `progress: ${agent.progress.done} / ${agent.progress.total} (${agent.progress.percent}%)<br>throughput: ${agent.throughput || '0 items/min'}<br>last active: ${agent.lastActive || 'unknown'}`;
                progressHtml = `<div class="agent-progress"><div class="progress-bar" style="width: ${agent.progress.percent}%"></div></div>`;
            }

            return `
                <div class="agent-card">
                    <div class="agent-header">
                        <div class="status-led ${status.led}"></div>
                        <span class="agent-name">${displayName}</span>
                        <span class="agent-status ${status.class}">${status.text}</span>
                    </div>
                    <div class="agent-meta">${meta}</div>
                    ${progressHtml}
                </div>
            `;
        }

        // 刷新数据
        function refreshData() {
            loadData();
        }

        // 显示历史
        function showHistory() {
            alert('History feature coming soon!');
        }

        // 初始加载
        loadData();

        // 自动刷新（每 30 秒）
        setInterval(loadData, 30000);
    </script>
</body>
</html>
